# A Claim is the atomic durable assertion. Each one MUST cite at least
# one Source or Evidence id; the citation is what makes the claim
# auditable.

id: short-kebab-case-slug
text: One sentence stating the claim.
type: observation        # fact | decision | preference | workflow | observation | question | warning
status: working          # working | actionable | stable | contested | superseded | archived | redacted
confidence: 0.7          # 0.0 – 1.0

evidence:
  - <source-sha256-or-evidence-id>

entities: []             # ids of related entities
supersedes: []           # claim ids this replaces
superseded_by: ""        # set when this claim is itself replaced
contradicts: []          # claim ids that contradict this one
scope: project           # private | project | team | public
tags: []

created_at: 2026-05-17T00:00:00Z
updated_at: 2026-05-17T00:00:00Z
last_confirmed_at: null
approved_by: ""          # set by vouch on approve; leave blank when authoring
